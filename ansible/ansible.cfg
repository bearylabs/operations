[defaults]
inventory          = inventory/onprem/hosts.ini
remote_user        = ubuntu
private_key_file   = ~/.ssh/k3s_onprem
host_key_checking  = False
roles_path         = roles
retry_files_enabled = False
stdout_callback    = default
result_format      = yaml

[privilege_escalation]
become        = True
become_method = sudo
become_user   = root
