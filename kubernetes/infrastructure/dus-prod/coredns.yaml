apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: coredns
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  sources:
    - repoURL: https://coredns.github.io/helm
      chart: coredns
      targetRevision: 1.43.0
      helm:
        valueFiles:
          - $values/kubernetes/infrastructure/dus-prod/coredns/values.yaml
    - repoURL: https://github.com/bearylabs/operations.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: coredns
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
