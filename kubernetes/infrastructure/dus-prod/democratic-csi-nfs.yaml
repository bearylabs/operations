apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: democratic-csi-nfs
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: https://democratic-csi.github.io/charts
    chart: democratic-csi
    targetRevision: 0.15.1
    helm:
      releaseName: democratic-csi-nfs
      values: |
          csiDriver:
            name: "org.democratic-csi.nfs"
          driver:
            existingConfigSecret: democratic-csi-nfs-config
            config:
              driver: freenas-api-nfs
          storageClasses:
            - name: truenas-nfs
              defaultClass: true
              reclaimPolicy: Delete
              volumeBindingMode: Immediate
              allowVolumeExpansion: true
              parameters:
                fsType: nfs
              mountOptions:
                - noatime
                - nfsvers=4
          # volumeSnapshotClasses disabled — requires external-snapshotter CRDs
          # enable after installing snapshot-controller
  destination:
    server: https://kubernetes.default.svc
    namespace: democratic-csi
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
